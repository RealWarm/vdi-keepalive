[General]
; 동작 주기 (초). 기본 5분
IntervalSec=1500

; 포커스 전환 후 마우스 이동까지 대기 시간 (ms)
WindowSwitchPauseMs=80

; 최소화된 대상 창은 건드리지 않음 (1=on, 0=off)
SkipIfMinimized=1

[Targets]
; 창 제목에 아래 문자열이 포함되면 대상으로 간주 (대소문자 무시, 부분 일치)
; 한 줄에 하나씩, KeywordN= 형식으로 여러 개 등록 가능
; 예: Citrix 창 제목이 "사용자명 - Citrix Workspace" 형태라면 "Citrix" 만으로 충분
Keyword1=Citrix
Keyword2=
Keyword3=
